<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern AI Real Estate Predictor</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="card">

<div class="header">
<h1 class="title">Bangalore Real Estate</h1>
<p class="subtitle">AI Price Predictor</p>
</div>

<form action="/predict" method="post">

<div class="input-group">
<label>Location</label>
<input type="text" name="location" placeholder="e.g. Whitefield" required>
</div>

<div class="input-group">
<label>Square Feet</label>
<input type="number" name="sqft" placeholder="e.g. 1200" required>
</div>

<div class="input-group">
<label>Bathrooms</label>
<input type="number" name="bath" placeholder="e.g. 2" required>
</div>

<div class="input-group">
<label>BHK</label>
<input type="number" name="bhk" placeholder="e.g. 3" required>
</div>

<button class="btn" type="submit">Calculate Estimate</button>

</form>

{% if prediction is not none %}

<div class="result-card">

<div class="result-label">Estimated Value</div>

<div class="result-price">
₹ {{prediction}} Lakhs
</div>

</div>

{% endif %}

</div>

</body>
</html>
